- name: Install Nginx package
  ansible.builtin.package:
    name: nginx
    state: present

- name: enable and start the service
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true


- name: import from common roles
  ansible.builtin.import_role:
    name: common
    tasks_from: app-pre-req

